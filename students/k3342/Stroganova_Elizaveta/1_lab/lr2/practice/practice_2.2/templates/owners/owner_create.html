<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Добавить владельца</title>
</head>
<body>
    <h2>Добавить нового владельца</h2>

    <a href="{% url 'owner_list' %}">Вернуться к списку владельцев</a>
</body>
</html>
