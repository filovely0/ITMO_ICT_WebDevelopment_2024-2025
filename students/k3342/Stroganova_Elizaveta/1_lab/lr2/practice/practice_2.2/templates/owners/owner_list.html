<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Список владельцев</title>
</head>
<body>
    <h2>Список владельцев</h2>
    <ul>
        {% for owner in owners %}
            <li>{{ owner.last_name }} {{ owner.first_name }} ({{ owner.birth_date }})</li>
        {% endfor %}
    </ul>
    <a href="{% url 'owner_create' %}">Добавить нового владельца</a>
</body>
</html>
